<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Ventana con persiana de aluminio iluminada por luz cálida, con un taladro inalámbrico y una planta en el alféizar, y la valoración 4,8 de Persianas Zambrana">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1"><stop offset="0" stop-color="#FCFCFE"/><stop offset="1" stop-color="#EAEDF2"/></linearGradient>
    <radialGradient id="blob" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FFC400" stop-opacity="0.16"/><stop offset="1" stop-color="#FFC400" stop-opacity="0"/></radialGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0" stop-color="#30353F"/><stop offset="1" stop-color="#191C22"/></linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFF6DD"/><stop offset="0.6" stop-color="#FFE6A6"/><stop offset="1" stop-color="#FCD173"/></linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FFFFFF" stop-opacity="0.9"/><stop offset="0.6" stop-color="#FFF6D8" stop-opacity="0.3"/><stop offset="1" stop-color="#FFF6D8" stop-opacity="0"/></radialGradient>
    <linearGradient id="lama" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FCE08A"/><stop offset="0.5" stop-color="#F3C246"/><stop offset="1" stop-color="#E0A413"/></linearGradient>
    <linearGradient id="sill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FEFEFF"/><stop offset="1" stop-color="#E6EAF0"/></linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFD24A"/><stop offset="0.5" stop-color="#FCC21F"/><stop offset="1" stop-color="#E09E00"/></linearGradient>
    <linearGradient id="grip" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2C313B"/><stop offset="1" stop-color="#181B21"/></linearGradient>
    <linearGradient id="chuck" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ECEFF3"/><stop offset="0.5" stop-color="#B9BFC8"/><stop offset="1" stop-color="#878D97"/></linearGradient>
    <linearGradient id="pot" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E0915A"/><stop offset="1" stop-color="#B4673A"/></linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4FAE7B"/><stop offset="1" stop-color="#2E8457"/></linearGradient>
    <clipPath id="glass"><rect x="268" y="104" width="264" height="292" rx="10"/></clipPath>
    <filter id="vsh" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="16" stdDeviation="17" flood-color="#141823" flood-opacity="0.20"/></filter>
    <filter id="vshS" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#141823" flood-opacity="0.18"/></filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="630" cy="140" r="340" fill="url(#blob)"/>

  <g filter="url(#vsh)"><rect x="240" y="70" width="320" height="360" rx="24" fill="url(#frame)"/></g>
  <rect x="232" y="52" width="336" height="32" rx="14" fill="#262A33"/>
  <rect x="268" y="104" width="264" height="292" rx="10" fill="url(#sky)"/>
  <g clip-path="url(#glass)">
    <circle cx="470" cy="290" r="132" fill="url(#sun)"/>
    <rect x="268" y="106" width="264" height="18" rx="5.5" fill="url(#lama)"/>
    <rect x="268" y="128" width="264" height="18" rx="5.5" fill="url(#lama)"/>
    <rect x="268" y="150" width="264" height="18" rx="5.5" fill="url(#lama)"/>
    <rect x="268" y="172" width="264" height="18" rx="5.5" fill="url(#lama)"/>
    <rect x="268" y="194" width="264" height="18" rx="5.5" fill="url(#lama)"/>
    <rect x="268" y="216" width="264" height="18" rx="5.5" fill="url(#lama)"/>
    <rect x="268" y="238" width="264" height="22" rx="5.5" fill="url(#lama)"/>
    <rect x="268" y="262" width="264" height="4" fill="#A9750A" opacity="0.4"/>
    <polygon points="252,104 500,104 364,396 252,396" fill="#FFFFFF" opacity="0.10"/>
  </g>
  <rect x="256" y="98" width="13" height="302" rx="4" fill="#343945"/>
  <rect x="531" y="98" width="13" height="302" rx="4" fill="#282D36"/>
  <rect x="240" y="70" width="320" height="360" rx="24" fill="none" stroke="#3C424E" stroke-width="1.5" opacity="0.5"/>
  <path d="M258 102 h268" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>

  <g filter="url(#vshS)">
    <rect x="188" y="430" width="424" height="24" rx="7" fill="url(#sill)"/>
    <rect x="188" y="453" width="424" height="13" rx="4" fill="#D5DAE2"/>
  </g>

  <ellipse cx="470" cy="452" rx="160" ry="18" fill="#11141C" opacity="0.13"/>

  <!-- Planta en el alféizar -->
  <g filter="url(#vshS)" transform="translate(250,361) scale(1.45)">
    <path d="M2 8 h44 l-4 36 a6 6 0 0 1 -6 5 h-24 a6 6 0 0 1 -6 -5 z" fill="url(#pot)"/>
    <rect x="-2" y="2" width="52" height="9" rx="4" fill="#E59A63"/>
    <path d="M24 2 C 8 -6 2 -22 10 -34 C 18 -24 24 -14 24 2 Z" fill="url(#leaf)"/>
    <path d="M24 2 C 40 -8 46 -22 40 -36 C 28 -26 22 -14 24 2 Z" fill="url(#leaf)" opacity="0.92"/>
    <path d="M24 2 C 22 -16 26 -30 24 -44 C 20 -30 22 -14 24 2 Z" fill="#3C9568"/>
  </g>

  <!-- Taladro inalámbrico realista -->
  <g filter="url(#vsh)" transform="translate(404,250) rotate(-6) scale(1.7)">
    <rect x="58" y="36" width="40" height="58" rx="11" fill="url(#grip)"/>
    <rect x="52" y="84" width="52" height="22" rx="9" fill="#20242C"/>
    <rect x="56" y="103" width="44" height="6" rx="3" fill="#13161B"/>
    <path d="M62 40 q-10 6 -8 24" stroke="#3A4049" stroke-width="3" fill="none" opacity="0.6"/>
    <rect x="40" y="6" width="74" height="40" rx="16" fill="url(#body)"/>
    <rect x="46" y="10" width="60" height="9" rx="4" fill="#FFFFFF" opacity="0.28"/>
    <g stroke="#B97E00" stroke-width="1.4" opacity="0.55"><line x1="84" y1="14" x2="84" y2="38"/><line x1="92" y1="14" x2="92" y2="38"/><line x1="100" y1="14" x2="100" y2="38"/></g>
    <path d="M58 46 q6 10 22 9" stroke="#C98F00" stroke-width="2" fill="none" opacity="0.5"/>
    <rect x="30" y="14" width="16" height="24" rx="5" fill="#23272F"/>
    <rect x="6" y="18" width="26" height="16" rx="6" fill="url(#chuck)"/>
    <g stroke="#7E848E" stroke-width="0.8" opacity="0.7"><line x1="12" y1="20" x2="12" y2="32"/><line x1="18" y1="19" x2="18" y2="33"/><line x1="24" y1="20" x2="24" y2="32"/></g>
    <ellipse cx="7" cy="26" rx="3.5" ry="8" fill="#D7DBE1"/>
    <rect x="-16" y="24" width="24" height="4" rx="2" fill="#4A4F58"/>
    <polygon points="-16,24 -22,26 -16,28" fill="#3A3F47"/>
    <rect x="44" y="12" width="40" height="5" rx="2.5" fill="#FFFFFF" opacity="0.32"/>
  </g>

  <!-- Valoración -->
  <g filter="url(#vsh)" transform="translate(78,120)">
    <rect x="0" y="0" width="244" height="92" rx="22" fill="#FFFFFF"/>
    <text x="28" y="62" font-family="Poppins, Arial, sans-serif" font-size="44" font-weight="700" fill="#16181D">4,8</text>
    <text x="104" y="42" font-family="Arial, sans-serif" font-size="22" fill="#F5B600" letter-spacing="2">★★★★★</text>
    <text x="104" y="70" font-family="Arial, sans-serif" font-size="16" fill="#8A909A">+400 reseñas · Google</text>
  </g>
</svg>
