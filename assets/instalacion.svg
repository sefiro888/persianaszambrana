<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Instalación de una persiana nueva con un nivel de burbuja centrado y una cinta métrica">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1"><stop offset="0" stop-color="#FCFCFE"/><stop offset="1" stop-color="#ECEEF3"/></linearGradient>
    <radialGradient id="blob" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FFC400" stop-opacity="0.14"/><stop offset="1" stop-color="#FFC400" stop-opacity="0"/></radialGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0" stop-color="#30353F"/><stop offset="1" stop-color="#1A1D23"/></linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFF7E2"/><stop offset="0.55" stop-color="#FFEBB6"/><stop offset="1" stop-color="#FDD884"/></linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FFFFFF" stop-opacity="0.92"/><stop offset="0.6" stop-color="#FFF6D8" stop-opacity="0.3"/><stop offset="1" stop-color="#FFF6D8" stop-opacity="0"/></radialGradient>
    <linearGradient id="lama" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FCE08A"/><stop offset="0.5" stop-color="#F3C246"/><stop offset="1" stop-color="#E0A413"/></linearGradient>
    <linearGradient id="sill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FEFEFF"/><stop offset="1" stop-color="#E6EAF0"/></linearGradient>
    <linearGradient id="level" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFD24A"/><stop offset="0.5" stop-color="#FCC21F"/><stop offset="1" stop-color="#E09E00"/></linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ECEFF3"/><stop offset="0.5" stop-color="#B9BFC8"/><stop offset="1" stop-color="#878D97"/></linearGradient>
    <clipPath id="glass"><rect x="276" y="98" width="248" height="240" rx="9"/></clipPath>
    <filter id="vsh" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="14" stdDeviation="15" flood-color="#141823" flood-opacity="0.20"/></filter>
    <filter id="vshS" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#141823" flood-opacity="0.18"/></filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="620" cy="120" r="300" fill="url(#blob)"/>

  <g filter="url(#vsh)"><rect x="250" y="58" width="300" height="328" rx="22" fill="url(#frame)"/></g>
  <rect x="244" y="48" width="312" height="22" rx="9" fill="#262A33"/>
  <rect x="276" y="98" width="248" height="240" rx="9" fill="url(#sky)"/>
  <g clip-path="url(#glass)">
    <circle cx="452" cy="240" r="110" fill="url(#sun)"/>
    <rect x="276" y="100" width="248" height="15" rx="5" fill="url(#lama)"/>
    <rect x="276" y="119" width="248" height="15" rx="5" fill="url(#lama)"/>
    <rect x="276" y="138" width="248" height="15" rx="5" fill="url(#lama)"/>
    <rect x="276" y="157" width="248" height="18" rx="5" fill="url(#lama)"/>
    <rect x="276" y="177" width="248" height="4" fill="#A9750A" opacity="0.4"/>
    <polygon points="262,98 486,98 360,338 262,338" fill="#FFFFFF" opacity="0.09"/>
  </g>
  <rect x="266" y="92" width="12" height="250" rx="4" fill="#343945"/>
  <rect x="522" y="92" width="12" height="250" rx="4" fill="#282D36"/>
  <rect x="250" y="58" width="300" height="328" rx="22" fill="none" stroke="#3C424E" stroke-width="1.5" opacity="0.5"/>

  <!-- Escuadras de montaje -->
  <g fill="url(#metal)" stroke="#7E848E" stroke-width="1">
    <path d="M250 70 h22 v8 h-14 v14 h-8 z"/>
    <path d="M550 70 h-22 v8 h14 v14 h8 z"/>
  </g>
  <circle cx="261" cy="84" r="2.6" fill="#4A4F58"/>
  <circle cx="539" cy="84" r="2.6" fill="#4A4F58"/>

  <!-- Nivel de burbuja sobre el cajón -->
  <g filter="url(#vsh)">
    <rect x="206" y="16" width="388" height="32" rx="8" fill="url(#level)"/>
    <rect x="206" y="16" width="20" height="32" rx="6" fill="#23272F"/>
    <rect x="574" y="16" width="20" height="32" rx="6" fill="#23272F"/>
    <rect x="232" y="20" width="336" height="6" rx="3" fill="#FFFFFF" opacity="0.3"/>
    <rect x="362" y="22" width="76" height="20" rx="10" fill="#23272F"/>
    <rect x="366" y="25" width="68" height="14" rx="7" fill="#8FD8A0"/>
    <ellipse cx="400" cy="32" rx="12" ry="6" fill="#E9FBEE"/>
    <line x1="388" y1="24" x2="388" y2="40" stroke="#1F6E3F" stroke-width="1.6"/>
    <line x1="412" y1="24" x2="412" y2="40" stroke="#1F6E3F" stroke-width="1.6"/>
    <circle cx="280" cy="32" r="6" fill="#23272F"/>
    <circle cx="520" cy="32" r="6" fill="#23272F"/>
  </g>

  <g filter="url(#vshS)">
    <rect x="205" y="372" width="390" height="22" rx="6" fill="url(#sill)"/>
    <rect x="205" y="393" width="390" height="12" rx="4" fill="#D5DAE2"/>
  </g>

  <ellipse cx="340" cy="392" rx="120" ry="14" fill="#11141C" opacity="0.12"/>

  <!-- Cinta métrica realista -->
  <g filter="url(#vsh)" transform="translate(250,318)">
    <rect x="0" y="0" width="86" height="68" rx="16" fill="url(#level)"/>
    <rect x="0" y="0" width="86" height="68" rx="16" fill="none" stroke="#C68B00" stroke-width="1"/>
    <rect x="14" y="10" width="58" height="22" rx="6" fill="#23272F"/>
    <text x="43" y="26" font-family="Poppins, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFC400" text-anchor="middle">PZ</text>
    <rect x="6" y="44" width="74" height="14" rx="4" fill="#16181D" opacity="0.85"/>
    <!-- tira de cinta extendida -->
    <rect x="-78" y="50" width="86" height="16" rx="3" fill="#FBF4E0" stroke="#E6D9B3" stroke-width="1"/>
    <g stroke="#3A3F47" stroke-width="1.4"><line x1="-70" y1="50" x2="-70" y2="60"/><line x1="-58" y1="50" x2="-58" y2="58"/><line x1="-46" y1="50" x2="-46" y2="60"/><line x1="-34" y1="50" x2="-34" y2="58"/><line x1="-22" y1="50" x2="-22" y2="60"/><line x1="-10" y1="50" x2="-10" y2="58"/></g>
    <rect x="-84" y="48" width="8" height="20" rx="2" fill="#D8403B"/>
  </g>

  <!-- Etiqueta -->
  <g filter="url(#vsh)" transform="translate(520,300)">
    <rect x="0" y="0" width="170" height="56" rx="16" fill="#16181D"/>
    <circle cx="30" cy="28" r="13" fill="#FFC400"/>
    <path d="M24 28 l5 6 9-11" stroke="#16181D" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="52" y="35" font-family="Poppins, Arial, sans-serif" font-size="19" font-weight="700" fill="#FFFFFF">Instalada</text>
  </g>
</svg>
