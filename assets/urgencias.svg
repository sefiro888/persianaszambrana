<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Ventana al anochecer con una persiana atascada, un aviso de alerta y una linterna realista encendida">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1"><stop offset="0" stop-color="#262B3A"/><stop offset="1" stop-color="#151823"/></linearGradient>
    <radialGradient id="blob" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FFB020" stop-opacity="0.22"/><stop offset="1" stop-color="#FFB020" stop-opacity="0"/></radialGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0" stop-color="#3B404C"/><stop offset="1" stop-color="#22262F"/></linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFE6A6"/><stop offset="0.55" stop-color="#F8C268"/><stop offset="1" stop-color="#E89A3C"/></linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FFFFFF" stop-opacity="0.8"/><stop offset="0.6" stop-color="#FFEFC8" stop-opacity="0.28"/><stop offset="1" stop-color="#FFEFC8" stop-opacity="0"/></radialGradient>
    <linearGradient id="lama" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FCE08A"/><stop offset="0.5" stop-color="#F3C246"/><stop offset="1" stop-color="#E0A413"/></linearGradient>
    <linearGradient id="sill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3A3F4C"/><stop offset="1" stop-color="#262B36"/></linearGradient>
    <linearGradient id="fbody" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3A4049"/><stop offset="1" stop-color="#1C2026"/></linearGradient>
    <linearGradient id="beam" x1="1" y1="0" x2="0" y2="0"><stop offset="0" stop-color="#FFE9A8" stop-opacity="0.55"/><stop offset="1" stop-color="#FFE9A8" stop-opacity="0"/></linearGradient>
    <linearGradient id="alert" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFC24D"/><stop offset="1" stop-color="#F0971A"/></linearGradient>
    <clipPath id="glass"><rect x="276" y="86" width="248" height="252" rx="9"/></clipPath>
    <filter id="vsh" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="14" stdDeviation="15" flood-color="#05070C" flood-opacity="0.45"/></filter>
    <filter id="vshS" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#05070C" flood-opacity="0.4"/></filter>
    <filter id="aglow" x="-70%" y="-70%" width="240%" height="240%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#F0971A" flood-opacity="0.7"/></filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="400" cy="230" r="320" fill="url(#blob)"/>

  <g filter="url(#vsh)"><rect x="250" y="55" width="300" height="330" rx="22" fill="url(#frame)"/></g>
  <rect x="242" y="38" width="316" height="30" rx="13" fill="#1B1F27"/>
  <rect x="276" y="86" width="248" height="252" rx="9" fill="url(#sky)"/>
  <g clip-path="url(#glass)">
    <circle cx="400" cy="250" r="120" fill="url(#sun)"/>
    <rect x="276" y="88" width="248" height="17" rx="5" fill="url(#lama)"/>
    <rect x="276" y="109" width="248" height="17" rx="5" fill="url(#lama)"/>
    <rect x="280" y="131" width="240" height="17" rx="5" fill="url(#lama)" transform="rotate(-3 400 139)"/>
    <rect x="276" y="153" width="170" height="17" rx="5" fill="url(#lama)"/>
    <rect x="300" y="178" width="224" height="17" rx="5" fill="url(#lama)" transform="rotate(2.5 400 186)"/>
    <rect x="276" y="201" width="248" height="18" rx="5" fill="url(#lama)" opacity="0.95"/>
    <rect x="276" y="221" width="248" height="4" fill="#A9750A" opacity="0.4"/>
  </g>
  <rect x="266" y="80" width="12" height="262" rx="4" fill="#2C313C"/>
  <rect x="522" y="80" width="12" height="262" rx="4" fill="#22262F"/>
  <rect x="250" y="55" width="300" height="330" rx="22" fill="none" stroke="#4A505C" stroke-width="1.5" opacity="0.6"/>

  <!-- Aviso de alerta elegante -->
  <g filter="url(#aglow)" transform="translate(372,150)">
    <path d="M30 2 a8 8 0 0 1 14 0 l28 50 a8 8 0 0 1 -7 12 h-56 a8 8 0 0 1 -7 -12 z" fill="url(#alert)"/>
    <rect x="33" y="22" width="8" height="22" rx="4" fill="#16181D"/>
    <circle cx="37" cy="52" r="4.4" fill="#16181D"/>
  </g>

  <g filter="url(#vshS)">
    <rect x="205" y="372" width="390" height="22" rx="6" fill="url(#sill)"/>
    <rect x="205" y="393" width="390" height="12" rx="4" fill="#1E222C"/>
  </g>

  <ellipse cx="400" cy="392" rx="150" ry="15" fill="#05070C" opacity="0.4"/>

  <!-- Haz de luz de la linterna -->
  <polygon points="300,360 150,300 150,420" fill="url(#beam)"/>

  <!-- Linterna realista -->
  <g filter="url(#vsh)" transform="translate(300,346) rotate(6)">
    <rect x="20" y="-15" width="86" height="30" rx="11" fill="url(#fbody)"/>
    <g stroke="#13161B" stroke-width="2" opacity="0.7"><line x1="60" y1="-13" x2="60" y2="13"/><line x1="68" y1="-13" x2="68" y2="13"/><line x1="76" y1="-13" x2="76" y2="13"/><line x1="84" y1="-13" x2="84" y2="13"/></g>
    <rect x="46" y="-15" width="10" height="30" rx="3" fill="#FFC400"/>
    <rect x="104" y="-9" width="12" height="18" rx="4" fill="#23272F"/>
    <rect x="2" y="-19" width="26" height="38" rx="9" fill="#2A2F38"/>
    <ellipse cx="6" cy="0" rx="7" ry="17" fill="#1A1D24"/>
    <ellipse cx="6" cy="0" rx="5" ry="14" fill="#FFF3C8"/>
    <ellipse cx="6" cy="0" rx="2.4" ry="7" fill="#FFFFFF"/>
    <rect x="26" y="-13" width="76" height="5" rx="2.5" fill="#FFFFFF" opacity="0.14"/>
  </g>

  <!-- Etiqueta 24 h -->
  <g filter="url(#vsh)" transform="translate(534,300)">
    <rect x="0" y="0" width="156" height="56" rx="16" fill="#FFC400"/>
    <circle cx="30" cy="28" r="14" fill="none" stroke="#16181D" stroke-width="3.4"/>
    <path d="M30 19 v9 l6 5" stroke="#16181D" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="54" y="36" font-family="Poppins, Arial, sans-serif" font-size="22" font-weight="700" fill="#16181D">Rápido</text>
  </g>
</svg>
