<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Lama nueva deslizándose en la guía de una persiana, con un cúter realista en el alféizar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1"><stop offset="0" stop-color="#FCFCFE"/><stop offset="1" stop-color="#ECEEF3"/></linearGradient>
    <radialGradient id="blob" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FFC400" stop-opacity="0.14"/><stop offset="1" stop-color="#FFC400" stop-opacity="0"/></radialGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0" stop-color="#30353F"/><stop offset="1" stop-color="#1A1D23"/></linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFF6DD"/><stop offset="0.6" stop-color="#FFE6A6"/><stop offset="1" stop-color="#FCD173"/></linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#FFFFFF" stop-opacity="0.9"/><stop offset="0.6" stop-color="#FFF6D8" stop-opacity="0.3"/><stop offset="1" stop-color="#FFF6D8" stop-opacity="0"/></radialGradient>
    <linearGradient id="lama" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FCE08A"/><stop offset="0.5" stop-color="#F3C246"/><stop offset="1" stop-color="#E0A413"/></linearGradient>
    <linearGradient id="lamaNew" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFEFB8"/><stop offset="0.5" stop-color="#FCCB3C"/><stop offset="1" stop-color="#F0B41A"/></linearGradient>
    <linearGradient id="sill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FEFEFF"/><stop offset="1" stop-color="#E6EAF0"/></linearGradient>
    <linearGradient id="kbody" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFD24A"/><stop offset="0.5" stop-color="#FCC21F"/><stop offset="1" stop-color="#E09E00"/></linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ECEFF3"/><stop offset="0.5" stop-color="#B9BFC8"/><stop offset="1" stop-color="#878D97"/></linearGradient>
    <clipPath id="glass"><rect x="276" y="86" width="248" height="252" rx="9"/></clipPath>
    <filter id="vsh" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="14" stdDeviation="15" flood-color="#141823" flood-opacity="0.20"/></filter>
    <filter id="vshS" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#141823" flood-opacity="0.18"/></filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#FFD24A" flood-opacity="0.85"/></filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="620" cy="110" r="300" fill="url(#blob)"/>

  <g filter="url(#vsh)"><rect x="250" y="55" width="300" height="330" rx="22" fill="url(#frame)"/></g>
  <rect x="242" y="38" width="316" height="30" rx="13" fill="#262A33"/>
  <rect x="276" y="86" width="248" height="252" rx="9" fill="url(#sky)"/>
  <g clip-path="url(#glass)">
    <circle cx="452" cy="250" r="112" fill="url(#sun)"/>
    <rect x="276" y="88" width="248" height="17" rx="5" fill="url(#lama)"/>
    <rect x="276" y="109" width="248" height="17" rx="5" fill="url(#lama)"/>
    <rect x="276" y="130" width="248" height="17" rx="5" fill="url(#lama)"/>
    <rect x="276" y="172" width="248" height="17" rx="5" fill="#15171B"/>
    <rect x="276" y="193" width="248" height="17" rx="5" fill="url(#lama)"/>
    <rect x="276" y="214" width="248" height="20" rx="5" fill="url(#lama)"/>
    <rect x="276" y="236" width="248" height="4" fill="#A9750A" opacity="0.4"/>
    <polygon points="262,86 486,86 360,338 262,338" fill="#FFFFFF" opacity="0.08"/>
  </g>
  <rect x="266" y="80" width="12" height="262" rx="4" fill="#343945"/>
  <rect x="522" y="80" width="12" height="262" rx="4" fill="#282D36"/>
  <rect x="250" y="55" width="300" height="330" rx="22" fill="none" stroke="#3C424E" stroke-width="1.5" opacity="0.5"/>
  <path d="M268 84 h252" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Lama nueva deslizándose hacia la ranura -->
  <g filter="url(#glow)">
    <rect x="300" y="151.5" width="372" height="19" rx="5.5" fill="url(#lamaNew)"/>
  </g>
  <rect x="300" y="151.5" width="372" height="19" rx="5.5" fill="url(#lamaNew)" stroke="#E9A800" stroke-width="1"/>
  <rect x="312" y="154" width="320" height="5" rx="2.5" fill="#FFFFFF" opacity="0.45"/>
  <!-- Flecha de inserción -->
  <path d="M286 161 h-30 M266 151 l-12 10 12 10" fill="none" stroke="#16181D" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#vshS)">
    <rect x="205" y="372" width="390" height="22" rx="6" fill="url(#sill)"/>
    <rect x="205" y="393" width="390" height="12" rx="4" fill="#D5DAE2"/>
  </g>

  <ellipse cx="380" cy="392" rx="120" ry="14" fill="#11141C" opacity="0.12"/>

  <!-- Cúter realista -->
  <g filter="url(#vsh)" transform="translate(286,370) rotate(-12)">
    <rect x="40" y="-14" width="118" height="28" rx="9" fill="url(#kbody)"/>
    <rect x="40" y="-14" width="118" height="28" rx="9" fill="none" stroke="#C68B00" stroke-width="1"/>
    <rect x="46" y="-12" width="100" height="6" rx="3" fill="#FFFFFF" opacity="0.28"/>
    <rect x="70" y="-15" width="40" height="13" rx="4" fill="#23272F"/>
    <g stroke="#454B54" stroke-width="1.4"><line x1="78" y1="-13" x2="78" y2="-4"/><line x1="86" y1="-13" x2="86" y2="-4"/><line x1="94" y1="-13" x2="94" y2="-4"/><line x1="102" y1="-13" x2="102" y2="-4"/></g>
    <rect x="20" y="-7" width="24" height="14" rx="3" fill="#2B303A"/>
    <polygon points="20,-6 -16,-10 -16,2 20,6" fill="url(#metal)"/>
    <polygon points="-16,-10 -16,2 -30,-2" fill="#D7DBE1"/>
    <line x1="2" y1="-7" x2="-10" y2="-3" stroke="#7E848E" stroke-width="1" opacity="0.7"/>
    <line x1="6" y1="-1" x2="-6" y2="3" stroke="#7E848E" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- Etiqueta -->
  <g filter="url(#vsh)" transform="translate(508,300)">
    <rect x="0" y="0" width="182" height="56" rx="16" fill="#16181D"/>
    <path d="M22 28 l8 9 16-18" stroke="#FFC400" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="58" y="35" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Lama nueva</text>
  </g>
</svg>
